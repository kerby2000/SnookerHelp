background_image: "Media/01_empty_table/DSC00543.JPG"

difference:
  blur_kernel: 5
  minimum_median_lab_distance: 15.0
  foreground_lab_distance: 20.0
  visualization_scale: 2.0

hough:
  dp: 1.2
  minimum_center_distance_radius_factor: 1.30
  edge_threshold: 60.0
  accumulator_threshold: 11.0
  minimum_radius_factor: 0.68
  maximum_radius_factor: 1.26

sampling:
  inner_radius_factor: 0.46
  highlight_value_limit: 250
  minimum_non_highlight_pixels: 20

circle_refinement:
  enabled: true
  angle_count: 180
  radial_step_px: 0.25
  inner_radius_factor: 0.62
  outer_radius_factor: 1.42
  minimum_edge_strength: 1.5
  minimum_points: 36
  maximum_center_shift_radius_factor: 0.35
  minimum_radius_factor: 0.72
  maximum_radius_factor: 1.30
  maximum_residual_px: 2.5

source_refinement:
  enabled: true
  angle_count: 180
  radial_step_px: 0.35
  inner_radius_factor: 0.55
  outer_radius_factor: 1.45
  minimum_edge_strength: 1.25
  minimum_points: 42
  maximum_center_shift_radius_factor: 0.45
  minimum_radius_factor: 0.65
  maximum_radius_factor: 1.45
  maximum_residual_px: 3.5
  roi_margin_radius_factor: 1.85
  minimum_roi_half_size_px: 24
  boundary_outlier_filter_enabled: true
  boundary_outlier_segment_endpoint_trim_points: 1
  boundary_outlier_segment_gap_factor: 2.25
  boundary_outlier_window_points: 9
  boundary_outlier_radius_factor: 0.085
  boundary_outlier_min_radius_px: 3.0
  boundary_outlier_ellipse_passes: 2
  boundary_outlier_ellipse_radius_factor: 0.08
  boundary_outlier_min_ellipse_residual_px: 3.25

evidence_maps:
  enabled: true
  cloth_reference_mode: global
  evidence_map_roi_radius_factor: 2.55
  evidence_map_minimum_half_size_px: 96
  minimum_value_for_color_model: 28.0
  highlight_value_limit: 245.0
  ball_inner_radius_factor: 0.55
  cloth_inner_radius_factor: 1.25
  cloth_outer_radius_factor: 1.95
  global_cloth_erode_px: 24
  global_cloth_exclusion_radius_factor: 2.2
  global_cloth_minimum_samples: 500
  physical_band_sigma_px: 5.5
  neighbor_ellipse_rejection_enabled: true
  neighbor_ellipse_rejection_axis_scale: 0.92
  neighbor_ellipse_rejection_distance_factor: 3.2
  final_position_policy:
    enabled: true
    default_map: ball_vs_cloth_probability
    maximum_axis_ratio: 2.0
    maximum_center_shift_radius_factor: 0.9
    maximum_major_axis_radius_factor: 3.2
    label_overrides:
      green: chroma_difference
      blue: chroma_difference
      brown: chroma_difference
    note: >
      User-reviewed free-standing balls showed ball-vs-cloth probability is
      the best default observed ellipse source, while green/blue/brown balls
      usually fit better from chroma difference. Other evidence maps remain
      diagnostics and do not influence the final source/table position.

physical_optimization:
  enabled: true
  loose_promotion_enabled: true
  loose_promotion_min_objective_improvement: 0.025
  loose_promotion_max_residual_px: 6.0
  loose_promotion_max_movement_mm: 8.0
  loose_promotion_min_observed_points: 18
  z_mm: 26.25
  minimum_observed_points: 18
  search_radius_mm: 18.0
  coarse_step_mm: 6.0
  movement_prior_mm: 18.0
  maximum_allowed_movement_mm: 28.0
  minimum_objective_improvement: 0.015
  residual_normalizer_px: 8.0
  missing_point_term: 0.72
  point_residual_weight: 0.42
  evidence_map_weight: 0.32
  movement_prior_weight: 0.18
  neighbor_penalty_weight: 0.06
  cushion_penalty_weight: 0.02

cluster_optimization:
  enabled: true
  target_distance_mm: 52.5
  neighbor_distance_factor: 1.22
  contact_distance_factor: 1.16
  iterations: 36
  pair_strength: 0.18
  collision_strength: 0.42
  anchor_blend: 0.08
  perimeter_weighted_fit_enabled: false
  perimeter_mobility: 0.55
  interior_mobility: 1.00
  perimeter_anchor_blend: 0.10
  interior_anchor_blend: 0.04
  max_movement_mm: 14.0
  minimum_improvement_mm: 0.35
  shell_classification_enabled: true
  shell_classification_min_size: 5
  shell_perimeter_distance_factor: 0.42
  shape_prior_enabled: true
  shape_prior_min_cluster_size: 5
  shape_prior_min_label_count: 5
  shape_prior_min_consensus_members: 4
  shape_prior_min_point_count: 55
  shape_prior_max_consensus_axis_ratio: 1.55
  shape_prior_major_scale_limit: 1.22
  shape_prior_minor_scale_limit: 1.22
  shape_prior_angle_delta_deg: 12.0
  arc_combo_fixed_shape_candidates_enabled: true
  arc_combo_max_search_groups: 10
  arc_combo_max_fixed_shape_combo_size: 5
  # Retained for diagnostics only. These sequential/per-ball promotions caused
  # the measured 32-36 px DSC00540 center failures.
  legacy_arc_combo_promotion_enabled: false
  joint_center_promotion_enabled: false
  joint_center_promotion_min_component_size: 4
  joint_center_promotion_roles: ["interior"]
  joint_center_promotion_min_improvement_mm: 0.75
  joint_center_promotion_min_movement_mm: 0.25
  joint_center_promotion_max_movement_mm: 10.0
  joint_center_promotion_require_weak_image_evidence: true
  joint_center_promotion_max_view_score_for_weak: 75.0
  joint_center_promotion_min_physical_residual_for_weak_px: 2.0
  joint_center_promotion_max_point_count_for_weak: 70
  joint_center_promotion_allow_shape_outliers: true

joint_cluster_solver:
  enabled: true
  generic_joint_promotion_enabled: true
  generic_promotion_min_component_size: 5
  generic_refine_iterations: 4
  generic_refine_min_owned_points: 5
  generic_start_max_shift_px: 8.0
  generic_max_center_shift_px: 8.0
  generic_start_jitter_px: 0.75
  generic_refine_blend: 0.85
  generic_unowned_weight: 0.22
  generic_movement_weight: 0.04
  generic_promotion_min_owned_points: 5
  generic_promotion_min_supported_node_fraction: 0.80
  generic_promotion_min_owned_fraction: 0.65
  generic_promotion_max_start_spread_px: 2.5
  generic_promotion_min_objective_improvement: 0.0005
  generic_hard_overlap_tolerance_mm_calibrated: 0.6
  generic_hard_overlap_tolerance_mm_approximate: 2.5
  generic_duplicate_suppression_enabled: true
  generic_duplicate_distance_factor: 0.45
  generic_duplicate_min_strength_ratio: 1.8
  generic_abstain_on_missing_hypothesis: true
  generic_missing_min_point_count: 14
  generic_missing_point_link_px: 7.0
  generic_missing_min_center_separation_factor: 0.70
  generic_highlight_min_value: 190
  generic_highlight_max_saturation: 150
  generic_highlight_max_normalized_radius: 0.45
  rack_joint_promotion_enabled: true
  rack_component_size: 15
  rack_min_red_fraction: 0.90
  joint_shape_min_member_count: 6
  joint_shape_max_axis_ratio: 1.60
  rack_min_contact_vectors: 8
  rack_phase_search_steps: 240
  rack_assignment_robust_limit_factor: 0.45
  rack_anchor_residual_factor: 0.16
  rack_arc_refine_iterations: 2
  rack_arc_refine_min_points: 5
  rack_arc_refine_max_shift_px: 5.5
  global_arc_residual_gate_px: 5.0
  global_arc_ambiguity_margin_px: 0.6
  rack_promotion_min_anchor_count: 8
  rack_promotion_max_anchor_rms_px: 6.0
  rack_promotion_min_owned_points_per_node: 5
  rack_promotion_min_owned_node_count: 14

selection:
  max_balls: 22
  spatial_diversity_weight: 0.50
  duplicate_suppression_enabled: true
  duplicate_same_label_only: true
  duplicate_suppression_near_edge_only: true
  duplicate_center_distance_radius_factor: 1.60
  isolated_overlap_suppression_enabled: true
  isolated_overlap_neighbor_radius_factor: 3.0
  isolated_overlap_max_same_label_cluster_size: 2
  edge_touch_bonus: 0.45
  edge_touch_max_distance_radius_factor: 3.0
  use_inventory_limits: true
  inventory_limits:
    red: 15
    yellow: 1
    green: 1
    brown: 1
    blue: 1
    pink: 1
    black: 1
    white: 1
    unknown: 22
